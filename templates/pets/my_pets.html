{% extends 'base.html' %}
{% block title %}Meus Pets — Get a Pet{% endblock %}

{% block content %}
<div class="container">
  <h2 class="section-title">Meus Pets</h2>
  <div class="alert" id="msg"></div>
  <div style="margin-bottom:1rem">
    <a href="/pets/create/" class="btn btn-primary">+ Cadastrar novo pet</a>
  </div>
  <div class="pets-grid" id="my-pets-grid"><p>Carregando...</p></div>

  <h2 class="section-title" style="margin-top:2.5rem">Minhas Adoções Agendadas</h2>
  <div class="pets-grid" id="my-adoptions-grid"><p>Carregando...</p></div>
</div>

<!-- Modal de edição -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto">
  <div class="form-card" style="margin:2rem auto;max-width:500px">
    <h2>Editar Pet</h2>
    <div class="alert" id="edit-msg"></div>
    <form id="edit-form">
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>Nome</label><input type="text" id="edit-name" required></div>
      <div class="form-group"><label>Idade</label><input type="text" id="edit-age" required></div>
      <div class="form-group"><label>Peso</label><input type="text" id="edit-weight" required></div>
      <div class="form-group"><label>Cor</label><input type="text" id="edit-color" required></div>
      <div class="form-group"><label>Novas fotos (opcional)</label><input type="file" id="edit-images" accept="image/*" multiple></div>
      <div style="display:flex;gap:.8rem">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (!getToken()) window.location.href = '/users/login/';

function petCard(pet, showConclude = false) {
  const img = pet.images[0]?.image || 'https://via.placeholder.com/260x200?text=Sem+foto';
  const badge = pet.available
    ? '<span class="badge badge-available">Disponível</span>'
    : '<span class="badge badge-unavailable">Adotado</span>';

  const adopter = pet.adopter_name
    ? `<div class="owner-info">Adotante agendado: <strong>${pet.adopter_name}</strong></div>`
    : '';

  const concludeBtn = showConclude && pet.available && pet.adopter
    ? `<button class="btn btn-accent btn-sm" onclick="conclude(${pet.id})">Concluir adoção</button>`
    : '';

  return `
    <div class="pet-card">
      <img src="${img}" alt="${pet.name}">
      <div class="pet-card-body">
        ${badge}
        <h3>${pet.name}</h3>
        <div class="pet-info">Idade: ${pet.age} | Peso: ${pet.weight} | Cor: ${pet.color}</div>
        ${adopter}
      </div>
      <div class="actions">
        ${showConclude ? `<button class="btn btn-outline btn-sm" onclick="openEdit(${JSON.stringify(pet).replace(/"/g,'&quot;')})">Editar</button>` : ''}
        ${showConclude ? `<button class="btn btn-danger btn-sm" onclick="removePet(${pet.id})">Remover</button>` : ''}
        ${concludeBtn}
      </div>
    </div>`;
}

async function loadMyPets() {
  const res = await apiFetch('/pets/mypets/');
  const data = await res.json();
  const grid = document.getElementById('my-pets-grid');
  grid.innerHTML = data.pets.length
    ? data.pets.map(p => petCard(p, true)).join('')
    : '<div class="empty-state" style="grid-column:1/-1"><p>Você ainda não cadastrou nenhum pet.</p></div>';
}

async function loadMyAdoptions() {
  const res = await apiFetch('/pets/myadoptions/');
  const data = await res.json();
  const grid = document.getElementById('my-adoptions-grid');
  grid.innerHTML = data.pets.length
    ? data.pets.map(p => petCard(p, false)).join('')
    : '<div class="empty-state" style="grid-column:1/-1"><p>Nenhuma adoção agendada ainda.</p></div>';
}

async function removePet(id) {
  if (!confirm('Tem certeza que deseja remover este pet?')) return;
  const res = await apiFetch(`/pets/${id}/`, { method: 'DELETE' });
  const data = await res.json();
  showAlert('#msg', data.message, res.ok ? 'success' : 'error');
  if (res.ok) loadMyPets();
}

async function conclude(id) {
  if (!confirm('Confirmar a conclusão da adoção?')) return;
  const res = await apiFetch(`/pets/${id}/conclude/`, { method: 'PATCH' });
  const data = await res.json();
  showAlert('#msg', data.message, res.ok ? 'success' : 'error');
  if (res.ok) loadMyPets();
}

function openEdit(pet) {
  document.getElementById('edit-id').value = pet.id;
  document.getElementById('edit-name').value = pet.name;
  document.getElementById('edit-age').value = pet.age;
  document.getElementById('edit-weight').value = pet.weight;
  document.getElementById('edit-color').value = pet.color;
  document.getElementById('edit-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('edit-modal').style.display = 'none';
}

document.getElementById('edit-form').addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('edit-id').value;
  const fd = new FormData();
  fd.append('name', document.getElementById('edit-name').value);
  fd.append('age', document.getElementById('edit-age').value);
  fd.append('weight', document.getElementById('edit-weight').value);
  fd.append('color', document.getElementById('edit-color').value);
  for (const f of document.getElementById('edit-images').files) fd.append('images', f);

  const res = await apiFetch(`/pets/${id}/`, { method: 'PATCH', body: fd });
  const data = await res.json();
  if (res.ok) {
    closeModal();
    showAlert('#msg', data.message, 'success');
    loadMyPets();
  } else {
    showAlert('#edit-msg', data.message || 'Erro ao atualizar.');
  }
});

document.addEventListener('DOMContentLoaded', () => {
  loadMyPets();
  loadMyAdoptions();
});
</script>
{% endblock %}
