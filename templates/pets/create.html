{% extends 'base.html' %}
{% block title %}Cadastrar Pet — Get a Pet{% endblock %}

{% block content %}
<div class="container">
  <div class="form-card" style="max-width:560px">
    <h2>Cadastrar Pet</h2>
    <div class="alert" id="msg"></div>

    <form id="pet-form">
      <div class="form-group">
        <label>Nome do pet</label>
        <input type="text" id="name" placeholder="Ex: Rex" required>
      </div>
      <div class="form-group">
        <label>Espécie</label>
        <select id="species" required>
          <option value="cachorro">Cachorro</option>
          <option value="gato">Gato</option>
        </select>
      </div>
      <div class="form-group">
        <label>Porte</label>
        <select id="size" required>
          <option value="pequeno">Pequeno</option>
          <option value="medio">Médio</option>
          <option value="grande">Grande</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sexo</label>
        <select id="sex" required>
          <option value="macho">Macho</option>
          <option value="femea">Fêmea</option>
        </select>
      </div>
      <div class="form-group">
        <label>Idade</label>
        <div class="input-group">
          <input type="number" id="age-value" min="0" step="1" placeholder="Ex: 3" required>
          <select id="age-unit">
            <option value="anos">Anos</option>
            <option value="meses">Meses</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Peso</label>
        <div class="input-group">
          <input type="number" id="weight-value" min="0" step="0.1" placeholder="Ex: 5" required>
          <select id="weight-unit">
            <option value="kg">Kg</option>
            <option value="g">Gramas</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Cor</label>
        <input type="text" id="color" placeholder="Ex: Marrom e branco" required>
      </div>
      <div class="form-group">
        <label>Fotos do pet (até 4)</label>
        <div class="pet-img-grid" id="pet-images-grid"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Cadastrar Pet</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (!getToken()) window.location.href = '/users/login/';

const petImages = createPetImageManager('pet-images-grid', 4);

document.getElementById('pet-form').addEventListener('submit', async e => {
  e.preventDefault();

  if (petImages.count() === 0) {
    showAlert('#msg', 'Adicione pelo menos uma foto do pet.');
    return;
  }

  const fd = new FormData();
  fd.append('name', document.getElementById('name').value);
  fd.append('species', document.getElementById('species').value);
  fd.append('size', document.getElementById('size').value);
  fd.append('sex', document.getElementById('sex').value);
  fd.append('age', `${document.getElementById('age-value').value} ${document.getElementById('age-unit').value}`);
  fd.append('weight', `${document.getElementById('weight-value').value} ${document.getElementById('weight-unit').value}`);
  fd.append('color', document.getElementById('color').value);
  fd.append('cover_index', petImages.getCoverIndex());
  petImages.getBlobs().forEach((blob, idx) => fd.append('images', blob, `pet-${idx}.jpg`));

  const res = await apiFetch('/pets/', { method: 'POST', body: fd });
  const data = await res.json();

  if (res.ok) {
    showAlert('#msg', data.message, 'success');
    setTimeout(() => window.location.href = '/pets/mypets/', 1500);
  } else {
    showAlert('#msg', data.message || 'Erro ao cadastrar pet.');
  }
});
</script>
{% endblock %}
