{% extends 'base.html' %}
{% block title %}Cadastrar — Get a Pet{% endblock %}

{% block content %}
<div class="container">
  <div class="form-card">
    <h2>Criar conta</h2>
    <div class="alert" id="msg"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="name" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" id="phone" placeholder="(11) 99999-9999" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" id="confirmpassword" placeholder="Repita a senha" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Cadastrar</button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:.9rem;">
      Já tem conta? <a href="/users/login/">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (getToken()) window.location.href = '/';

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await apiFetch('/users/register/', {
    method: 'POST',
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      password: document.getElementById('password').value,
      confirmpassword: document.getElementById('confirmpassword').value,
    }),
  });
  const data = await res.json();
  if (res.ok) {
    setSession(data);
    window.location.href = '/';
  } else {
    showAlert('#msg', data.message || 'Erro no cadastro.');
  }
});
</script>
{% endblock %}
